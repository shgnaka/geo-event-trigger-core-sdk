name: Publish To Maven Central

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish-central:
    name: publish-central
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947
        with:
          gradle-version: current

      - name: Validate publish context
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.CENTRAL_PORTAL_USERNAME }}"
          test -n "${{ secrets.CENTRAL_PORTAL_PASSWORD }}"
          test -n "${{ secrets.SIGNING_KEY }}"
          test -n "${{ secrets.SIGNING_PASSWORD }}"

          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag must match vX.Y.Z. got=$tag"
            exit 1
          fi
          version="${tag#v}"
          echo "ARTIFACT_VERSION=$version" >> "$GITHUB_ENV"

      - name: Quality gates
        shell: bash
        run: |
          set -euo pipefail
          ci/run-lint.sh
          ci/run-unit.sh
          ci/run-consistency.sh
          ci/run-contract.sh
          ci/run-compatibility.sh
          ci/run-policy.sh
          ci/run-security-audit.sh

      - name: Security loop gate
        shell: bash
        env:
          GATE_THRESHOLD: high
        run: |
          set -euo pipefail
          security-loop/run.sh \
            --module core-sdk \
            --iterations 1 \
            --mode ci \
            --out-dir out/security-loop-publish \
            --gate-threshold "$GATE_THRESHOLD"

      - name: Upload security loop reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-loop-reports-publish
          path: out/security-loop-publish/*.json
          if-no-files-found: ignore

      - name: Publish to Maven Central
        shell: bash
        env:
          ARTIFACT_VERSION: ${{ env.ARTIFACT_VERSION }}
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          set -euo pipefail
          gradle \
            -PartifactVersion="$ARTIFACT_VERSION" \
            -PcentralPortalUsername="$CENTRAL_PORTAL_USERNAME" \
            -PcentralPortalPassword="$CENTRAL_PORTAL_PASSWORD" \
            -PsigningKey="$SIGNING_KEY" \
            -PsigningPassword="$SIGNING_PASSWORD" \
            clean publish
