name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lint target
        shell: bash
        run: |
          set -euo pipefail
          if [ -x ci/run-lint.sh ]; then
            ci/run-lint.sh
          elif [ -f Makefile ] && grep -qE '^lint:' Makefile; then
            make lint
          elif [ -f package.json ] && grep -q '"lint"' package.json; then
            npm ci
            npm run lint
          else
            echo "No lint target found. Skipping."
          fi

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run unit test target
        shell: bash
        run: |
          set -euo pipefail
          if [ -x ci/run-unit.sh ]; then
            ci/run-unit.sh
          elif [ -f Makefile ] && grep -qE '^test:' Makefile; then
            make test
          elif [ -f package.json ] && grep -q '"test"' package.json; then
            npm ci
            npm test -- --ci
          else
            echo "No unit target found. Skipping."
          fi

  contract:
    name: contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run contract test target
        shell: bash
        run: |
          set -euo pipefail
          if [ -x ci/run-contract.sh ]; then
            ci/run-contract.sh
          elif [ -f Makefile ] && grep -qE '^contract:' Makefile; then
            make contract
          elif [ -f package.json ] && grep -qE '"contract(:test)?"|"test:contract"' package.json; then
            npm ci
            if npm run | grep -q 'test:contract'; then
              npm run test:contract
            else
              npm run contract:test
            fi
          else
            echo "No contract target found. Skipping."
          fi

  consistency:
    name: consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run consistency test target
        shell: bash
        run: |
          set -euo pipefail
          if [ -x ci/run-consistency.sh ]; then
            ci/run-consistency.sh
          elif [ -f Makefile ] && grep -qE '^consistency:' Makefile; then
            make consistency
          else
            echo "No consistency target found. Skipping."
          fi

  compatibility:
    name: compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run compatibility test target
        shell: bash
        run: |
          set -euo pipefail
          if [ -x ci/run-compatibility.sh ]; then
            ci/run-compatibility.sh
          elif [ -f Makefile ] && grep -qE '^compatibility:' Makefile; then
            make compatibility
          else
            echo "No compatibility target found. Skipping."
          fi

  policy:
    name: policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run policy test target
        shell: bash
        run: |
          set -euo pipefail
          if [ -x ci/run-policy.sh ]; then
            ci/run-policy.sh
          elif [ -f Makefile ] && grep -qE '^policy:' Makefile; then
            make policy
          else
            echo "No policy target found. Skipping."
          fi

  security:
    name: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: Scan for likely secrets in repository
        shell: bash
        run: |
          set -euo pipefail
          if git grep -nE '(AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|AIza[0-9A-Za-z_-]{35}|-----BEGIN (RSA|OPENSSH|EC) PRIVATE KEY-----)' -- . ':!docs/*'; then
            echo "Potential secret-like string found."
            exit 1
          fi
          echo "No secret-like strings detected."
      - name: Dependency audit (best effort)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ] && [ -f package.json ]; then
            npm ci
            npm audit --audit-level=high
          else
            echo "No dependency lockfile found. Skipping dependency audit."
          fi
      - name: Runtime privacy audit
        shell: bash
        run: |
          set -euo pipefail
          if [ -x ci/run-security-audit.sh ]; then
            ci/run-security-audit.sh
          else
            echo "No runtime privacy audit target found. Skipping."
          fi
      - name: Security loop (attacker -> defender)
        shell: bash
        env:
          GATE_THRESHOLD: high
        run: |
          set -euo pipefail
          if [ -x security-loop/run.sh ]; then
            security-loop/run.sh \
              --module core-sdk \
              --iterations 1 \
              --mode ci \
              --out-dir out/security-loop-ci \
              --gate-threshold "$GATE_THRESHOLD"
          else
            echo "No security-loop runner found. Skipping."
          fi
      - name: Upload security loop reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-loop-reports
          path: out/security-loop-ci/*.json
          if-no-files-found: ignore
      - name: Create/update medium-risk tracking issue
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const summaryPath = "out/security-loop-ci/summary.json";
            const reportPath = "out/security-loop-ci/attacker.report.json";
            if (!fs.existsSync(summaryPath) || !fs.existsSync(reportPath)) {
              core.info("security-loop reports not found; skip medium issue handling.");
              return;
            }

            const summary = JSON.parse(fs.readFileSync(summaryPath, "utf8"));
            const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
            const mediumCount = Number(summary?.counts?.medium || 0);
            if (mediumCount <= 0) {
              core.info("no medium findings; skip issue creation.");
              return;
            }

            const moduleName = summary.module || "core-sdk";
            const title = `[security-medium][${moduleName}] security-loop findings`;
            const findings = (report.findings || []).filter(f => f.severity === "medium");
            const lines = findings.slice(0, 10).map(f =>
              `- ${f.finding_id}: ${f.category}\n  - evidence: ${(f.evidence || []).join(" | ")}`
            );
            const body =
              `Auto-generated from CI security loop.\n\n` +
              `- PR: #${context.issue.number}\n` +
              `- Module: ${moduleName}\n` +
              `- Medium findings: ${mediumCount}\n` +
              `- Generated at: ${summary.generated_at}\n\n` +
              `## Findings (top 10)\n${lines.join("\n")}\n\n` +
              `## Required Action\n` +
              `Assign owner + ETA in PM daily triage.`;

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });
            const existing = openIssues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
              core.info(`updated existing medium issue #${existing.number}`);
              return;
            }

            try {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["agent:security-audit", "risk:medium", "status:ready"]
              });
              core.info(`created medium issue #${created.data.number}`);
            } catch (e) {
              core.warning(`issue creation with labels failed: ${e.message}`);
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
              core.info(`created medium issue without labels #${created.data.number}`);
            }
