name: Bug
description: Report a defect with reproduction details
title: "fix: "
labels:
  - status:triage
  - priority:p1
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact / Risk
      placeholder: user impact, data risk, privacy impact
    validations:
      required: true

